apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
        - name: manager
          args:
            - "--metrics-addr=127.0.0.1:8080"
            - "--secure-metrics=false"
            - "--enable-leader-election"
            - "--zap-devel=false"
